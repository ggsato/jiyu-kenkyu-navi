services:
  postgres:
    image: postgres:16-alpine
    container_name: jiyu-kenkyu-navi-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: jiyu_kenkyu_navi
      POSTGRES_USER: jiyu_user
      POSTGRES_PASSWORD: jiyu_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
